openapi: 3.0.0
info:
  title: DevRamp AI API
  version: 1.0.0
  description: API for the DevRamp AI platform powering intelligent developer onboarding.
servers:
  - url: http://localhost:8000
    description: Bob Service API
  - url: http://localhost:3000/api
    description: Core Node.js API
paths:
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
  /analyze:
    post:
      summary: Analyze Repository via IBM Bob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repository_url:
                  type: string
                branch:
                  type: string
      responses:
        '200':
          description: Repository analysis results
